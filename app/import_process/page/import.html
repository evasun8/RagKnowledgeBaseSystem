<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Import Service</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #3498db;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background-color: #ecf6fd;
        }
        .upload-icon {
            font-size: 48px;
            color: #3498db;
            margin-bottom: 10px;
        }
        .file-input {
            display: none;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .file-list {
            margin-top: 30px;
        }
        .file-item {
            background-color: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 20px;
        }
        .file-name {
            font-weight: 600;
            color: #333;
        }
        .file-size {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            min-width: 80px;
            text-align: center;
        }
        .status-uploading { background-color: #f39c12; }
        .status-processing { background-color: #3498db; }
        .status-completed { background-color: #2ecc71; }
        .status-error { background-color: #e74c3c; }
         
        /* Simple Progress Bar */
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background-color: #f0f0f0;
            margin-top: 8px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background-color: #f39c12;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
 
        /* Task Logs (Expandable/Collapsible) */
        .log-details {
            margin-top: 8px;
            font-size: 12px;
            color: #7f8c8d;
        }
        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: #6c7a89;
        }
        .log-list {
            margin: 6px 0 0 16px;
            padding: 0;
        }
        .log-list li {
            margin: 2px 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>
 
<div class="container">
    <h1>📄 Knowledge Base File Import</h1>
     
    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">☁️</div>
        <p>Click or drag & drop files here (PDF/MD)</p>
        <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.md">
    </div>
 
    <div id="fileList" class="file-list">
        <!-- File list will be generated here -->
    </div>
</div>
 
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
     
    // Backend API Base URL
    const API_BASE = 'http://127.0.0.1:8000';
 
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '#ecf6fd';
    });
 
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '';
    });
 
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.backgroundColor = '';
        handleFiles(e.dataTransfer.files);
    });
 
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });
 
    function handleFiles(files) {
        Array.from(files).forEach(uploadFile);
    }
 
    function updateProgressBar(bar, percentage) {
        bar.style.width = percentage + '%';
        if (percentage >= 100) {
            bar.style.backgroundColor = '#3498db'; // Blue
        } else {
            bar.style.backgroundColor = '#f39c12'; // Orange-Red
        }
    }
 
    async function uploadFile(file) {
        // Create file item UI element
        const id = 'file-' + Math.random().toString(36).substr(2, 9);
        const html = `
            <div class="file-item" id="${id}">
                <div class="file-info">
                    <span class="file-name">${file.name}</span>
                    <span class="file-size">${(file.size / 1024).toFixed(2)} KB</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                    </div>
                    <details class="log-details">
                        <summary>Logs (Click to expand)</summary>
                        <ul class="log-list"></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">Uploading...</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);
        const itemEl = document.getElementById(id);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');
        const progressContainer = itemEl.querySelector('.progress-bar-container');
        const logDetails = itemEl.querySelector('.log-details');
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');
 
        // Construct FormData
        const formData = new FormData();
        formData.append('files', file);
 
        try {
            // 1. Upload File
            progressContainer.style.display = 'block';
            // Simulate upload progress
            updateProgressBar(progressBar, 50);
 
            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });
 
            if (!response.ok) throw new Error('Upload failed');
             
            const result = await response.json();
            const taskId = result.task_ids[0]; // Assuming single file upload or fetching first ID
 
            // Upload complete, entering processing status, progress fixed at 30%
            updateProgressBar(progressBar, 30);
            statusBadge.textContent = 'Processing...';
            statusBadge.className = 'status-badge status-processing';
 
            // 2. Poll Status
            pollStatus(taskId, itemEl);
 
        } catch (error) {
            console.error(error);
            statusBadge.textContent = 'Failed';
            statusBadge.className = 'status-badge status-error';
        }
    }
 
    function normalizeDoneLog(text) {
        // The backend might return English or localized node names, or status strings
        if (typeof text !== 'string') return String(text);
        return text.endsWith('completed') || text.endsWith('done') ? text : `${text} completed`;
    }
 
    function normalizeRunningLog(text) {
        if (typeof text !== 'string') return String(text);
        if (text.startsWith('Running') || text.startsWith('Processing')) return text.endsWith('...') ? text : `${text}...`;
        return `Executing ${text}...`;
    }
 
    function renderLogs(itemEl, doneList, runningList) {
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');
        const logDetails = itemEl.querySelector('.log-details');
 
        const done = Array.isArray(doneList) ? doneList : [];
        const running = Array.isArray(runningList) ? runningList : [];
 
        // Update summary (visible even when collapsed to show overall progress)
        logSummary.textContent = `Logs (Completed: ${done.length}, Running: ${running.length}, Click to expand)`;
 
        // Clear and rebuild log list
        logListEl.innerHTML = '';
        const lines = [
            ...done.map(normalizeDoneLog),
            ...running.map(normalizeRunningLog),
        ];
 
        if (lines.length === 0) {
            const li = document.createElement('li');
            li.textContent = 'No logs available';
            logListEl.appendChild(li);
        } else {
            for (const line of lines) {
                const li = document.createElement('li');
                li.textContent = line;
                logListEl.appendChild(li);
            }
        }
 
        // Auto-collapse details if there are no logs; otherwise keep user's open/close selection
        if (lines.length === 0) {
            logDetails.open = false;
        }
    }
 
    function pollStatus(taskId, itemEl) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressBar = itemEl.querySelector('.progress-bar');
         
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                const data = await res.json();
 
                // Render status logs (done/running)
                renderLogs(itemEl, data.done_list, data.running_list);
                 
                if (data.status === 'completed') {
                    statusBadge.textContent = 'Completed';
                    statusBadge.className = 'status-badge status-completed';
                    updateProgressBar(progressBar, 100);
                    clearInterval(interval);
                } else if (data.status === 'processing') {
                    // Keep processing status active
                    statusBadge.textContent = 'Processing...';
                    // Ensure the progress bar reflects 30% during execution
                    updateProgressBar(progressBar, 30);
                } else if (data.status === 'failed') {
                    statusBadge.textContent = 'Failed';
                    statusBadge.className = 'status-badge status-error';
                    clearInterval(interval);
                }
            } catch (e) {
                console.error('Polling error', e);
            }
        }, 2000); // Poll status every 2 seconds
    }
</script>
 
</body>
</html>
